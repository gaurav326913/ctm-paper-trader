name: CTM Daily Scan

on:
  schedule:
    # Evening scan: 6:00 PM IST (12:30 UTC) Mon-Fri — run Chartink, queue candidates
    - cron: '30 12 * * 1-5'
    # Morning entry: 9:20 AM IST (03:50 UTC) Mon-Fri — enter at actual open price
    - cron: '50 3 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run CTM engine
        run: python -m ctm.main
        env:
          CHARTINK_EMAIL:    ${{ secrets.CHARTINK_EMAIL }}
          CHARTINK_PASSWORD: ${{ secrets.CHARTINK_PASSWORD }}
          POSITION_SIZE:     "25000"
          MAX_POSITIONS:     "20"
          MIN_SCANS:         "3"
          ATR_SL_MULT:       "2"
          ATR_TGT_MULT:      "4"

      - name: Commit updated data + dashboard
        run: |
          git config user.name  "CTM Bot"
          git config user.email "ctm-bot@users.noreply.github.com"
          git add data/trades.json docs/index.html
          git diff --staged --quiet || git commit -m "Auto update $(date +'%Y-%m-%d %H:%M')"
          git push
